name: Update filtered perovskite RSS

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate filtered RSS
        run: |
          python filter_perovskite_rss.py

      - name: Commit updated RSS
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add filtered_perovskite.xml
          git commit -m "Update filtered perovskite RSS" || echo "No changes to commit"
          git push
